*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:14px}
.header{background:#1a1a2e;color:#fff;padding:16px 24px;display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.header .badge{background:#ff6b35;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:0.5px}
.header .updated{margin-left:auto;font-size:11px;color:#aaa}
.container{max-width:1280px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:0;border-bottom:2px solid #e2e6ea;margin-bottom:16px}
.tab{padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600;color:#666;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab.active{color:#1a1a2e;border-bottom-color:#1a1a2e}
.tab:hover:not(.active){color:#333}
.panel{display:none}.panel.active{display:block}
.controls{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-label{font-size:12px;color:#666;font-weight:600}
.btn-group{display:flex;gap:4px}
.btn{padding:5px 12px;border:1px solid #d0d5dd;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#555;font-weight:500;transition:all .15s}
.btn.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.btn:hover:not(.active){background:#f7f9fc}
.divider{width:1px;height:20px;background:#e2e6ea;margin:0 4px}
.table-wrap{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:#f7f9fc;padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:#888;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid #e9ecf0}
th:first-child{width:44px;text-align:center}
th.num{text-align:right}
td{padding:9px 14px;border-bottom:1px solid #f0f2f5;font-size:13px;vertical-align:middle}
td:first-child{text-align:center}
td.num{text-align:right;font-variant-numeric:tabular-nums}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:12px;font-weight:700;color:#666;background:#f0f2f5}
.rank-badge.gold{background:#FFF3CD;color:#B8860B}
.rank-badge.silver{background:#F0F0F0;color:#666}
.rank-badge.bronze{background:#FDE8D8;color:#A0522D}
.brand-code{font-size:11px;color:#aaa;margin-left:5px}
.growth-pos{color:#e53935;font-weight:700}
.growth-high{color:#c62828;font-weight:800}
.new-badge{font-size:9px;background:#e53935;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:700}
.brand-nm{font-weight:600;color:#1a1a2e}
.country-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;margin-right:4px}
.c-jp{background:#FFF0F0;color:#c0392b}
.c-us{background:#EEF5FF;color:#2563eb}
.c-hk{background:#FFF8E7;color:#B7791F}
.c-tw{background:#F0FFF4;color:#276749}
.c-sg{background:#FDF4FF;color:#7C3AED}
.gender-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;margin-right:4px}
.g-m{background:#E8F4FD;color:#1565C0}
.g-w{background:#FCE4EC;color:#C62828}
.g-mw{background:#F3E5F5;color:#6A1B9A}
.empty{text-align:center;padding:40px;color:#aaa;font-size:13px}
.summary-bar{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.summary-card{background:#fff;border-radius:8px;padding:10px 16px;flex:1;min-width:120px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.summary-card .s-label{font-size:10px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.summary-card .s-val{font-size:20px;font-weight:800;color:#1a1a2e;margin-top:2px}
.summary-card .s-sub{font-size:10px;color:#aaa;margin-top:1px}

// === UTILS ===
function fmt(n){
  if(n>=1000000) return '$'+(n/1000000).toFixed(1)+'M';
  if(n>=1000) return '$'+(n/1000).toFixed(1)+'K';
  return '$'+n;
}
function fmtNum(n){ return n.toLocaleString(); }
function rnkBadge(r){
  let cls=r==1?'gold':r==2?'silver':r==3?'bronze':'';
  let sym=r==1?'🥇':r==2?'🥈':r==3?'🥉':r;
  return `<span class="rank-badge ${cls}">${sym}</span>`;
}
function brandName(b, nm){ return nm||(BN[b]||b); }

// === RENDER MONTHLY ===
function renderMonthly(){
  const {country1, month} = state;
  let rows = MONTHLY.filter(r=>r[0]===String(month));
  let isAll1 = country1==='ALL';
  if(!isAll1) rows = rows.filter(r=>r[1]===country1);
  // For ALL: aggregate and re-rank
  if(isAll1){
    let agg={};
    rows.forEach(([ym,co,rk,br,rv,qty,ord])=>{
      if(!agg[br]) agg[br]={brand:br,revenue:0,qty:0,orders:0};
      agg[br].revenue+=rv; agg[br].qty+=qty; agg[br].orders+=ord;
    });
    rows=Object.values(agg).sort((a,b)=>b.revenue-a.revenue).slice(0,20).map((r,i)=>([month,'ALL',i+1,r.brand,r.revenue,r.qty,r.orders]));
  }
  let html=`<div class="table-wrap"><table>
    <tr><th>#</th><th>브랜드</th><th class="num">매출(USD)</th><th class="num">수량</th><th class="num">주문수</th></tr>`;
  rows.forEach(([ym,co,rk,br,rv,qty,ord])=>{
    let nm=BN[br]||br;
    html+=`<tr><td>${rnkBadge(rk)}</td>
    <td><span class="brand-nm">${nm}</span> <span class="brand-code">${br}</span></td>
    <td class="num">${fmt(rv)}</td>
    <td class="num">${fmtNum(qty)}</td>
    <td class="num">${fmtNum(ord)}</td></tr>`;
  });
  if(!rows.length) html+=`<tr><td colspan="6" class="empty">데이터 없음</td></tr>`;
  html+='</table></div>';
  document.getElementById('monthlyTable').innerHTML=html;
}
